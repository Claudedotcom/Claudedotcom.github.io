<!DOCTYPE html>
<html>
<head>
    <title>The Dark World</title>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&display=swap" rel="stylesheet">
</head>
<body>
    <h1>Welcome to the Dark Side</h1>
    <p>You shouldn't have come here...</p>
    <h2>Things that lurk here...</h2>
<ul>
    <li>Vampires</li>
    <li>Shadows</li>
    <li>Ancient curses</li>
    <li>Things with no name</li>
</ul>

<p><a href="C:/code/1stwebsite.html">C:/code/1stwebsite.html</a></p>

<div onclick="alert('If you knew where to look - kudos to you! You\'re a suspicious owl! If you stumbled upon this, oh well. You\'re an unsuspecting dog!')" style="position: fixed; top: 0; right: 0; width: 50px; height: 50px; cursor: default;">
</div>

<div id="chatbox">
    <p id="chatresponse">Ask me something, if you dare...</p>
    <input type="text" id="userinput" placeholder="Type here...">
    <button onclick="respond()">Ask</button>
</div>


<script>
    function respond() {    
        var input = document.getElementById("userinput").value.toLowerCase();
        var response = "";

    if (input.includes("who are you")) {
        response = "I am the darkness between the stars...";
    } else if (input.includes("hello")) {
        response = "You shouldn't have come here...";
    } else if (input.includes("help")) {
        response = "No one can help you now...";
    } else if (input.includes("vampire")) {
        response = "We do not speak of them in the light...";
    } else {
        response = "The shadows do not answer...";
    }

    document.getElementById("chatresponse").innerText = response;
}
</script>

</script>

</body>
<style>
    a {
        color: rgb(166, 230, 255);
    }
    body {
        background-color: rgb(34, 58, 58);
        color: rgb(98, 9, 161);
        font-family: Georgia, serif;

        @keyframes flicker {
            0% { opacity: 1; }
            25% {opacity: 0.3;}
            50% { opacity: 0.8; }
            75% { opacity: 0.2; }
            100% { opacity: 1; }
}


        h1 {
            color: rgb(66, 2, 2);
            font-family: 'Creepster', cursive;
            text-shadow: 0 0 10px rgb(173, 207, 50), 0 0 50px rgb(223, 173, 233);
            animation: flicker 1.5s infinite;
        }
    }

    h1 {
        color: rgb(66, 2, 2);
        font-family: "Creepster", cursive;
        text-shadow: 0 0 10px rgb(173, 207, 50), 0 0 50px rgb(223, 173, 233);
    }
    #chatbox {
    margin-top: 20px;
}

#chatresponse {
    color: lavender;
    font-style: italic;
}

#userinput {
    background-color: black;
    color: lavender;
    border: 1px solid darkred;
    padding: 5px;
}

button {
    background-color: darkred;
    color: lavender;
    border: none;
    padding: 5px 10px;
    cursor: pointer;
}

</style>
